<!doctype html>
<html lang="th" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>JP Visual &amp; Docs</title>
    <meta
      name="description"
      content="JP Visual & Docs — ระบบเอกสารและเครื่องมือช่วยงาน"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="JP System" />
    <meta
      name="keywords"
      content="JP, Visual, Docs, ระบบเอกสาร, เครื่องมือ, งาน"
    />

    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0f172a"
      media="(prefers-color-scheme: dark)"
    />

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&family=Noto+Sans+Thai&display=swap"
      rel="stylesheet"
    />

    <meta property="og:title" content="JP Visual &amp; Docs" />
    <meta
      property="og:description"
      content="ระบบเอกสารและเครื่องมือช่วยงาน จาก JP System"
    />
    <meta property="og:url" content="https://404notfontjp.vercel.app" />
    <meta name="twitter:card" content="summary_large_image" />

    <script>
      try {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)"
        ).matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) {}
    </script>
  </head>

  <body class="bg-base-100 text-base-content antialiased font-thsarabun">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
