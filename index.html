<!DOCTYPE html>
<html lang="th" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ✅ SEO -->
    <meta name="description" content="JP Visual & Docs — พอร์ตโฟลิโอและระบบจัดการเอกสารภาครัฐ" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="JP System" />
    <meta name="keywords" content="JP, Visual, Docs, พอร์ตโฟลิโอ, เอกสารภาครัฐ, ระบบจัดการ" />

    <!-- ✅ Theme color for light/dark mode -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />

    <!-- ✅ Favicon & Web App Support -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ✅ Fonts Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto&family=Noto+Sans+Thai&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Social Sharing / Open Graph -->
    <meta property="og:title" content="JP Visual & Docs" />
    <meta property="og:description" content="ระบบจัดการเอกสารภาครัฐและพอร์ตโฟลิโอของ JP System" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://your-domain.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- ✅ Title -->
    <title>JP Visual & Docs</title>

    <!-- ✅ Preload theme on first paint -->
    <script>
      try {
        const saved = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = saved || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
      } catch (_) {
        // Fail silently
      }
    </script>
  </head>

  <body class="bg-base-100 text-base-content antialiased">
    <div id="root"></div>

    <!-- ✅ React App Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
